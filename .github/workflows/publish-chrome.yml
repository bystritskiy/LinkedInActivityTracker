name: Publish Chrome Extension

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: publish-chrome-${{ github.ref }}
  cancel-in-progress: false

env:
  CHROME_WEBSTORE_EXTENSION_ID: gfnnloflkodejhnpbhpibhodclofpkkk

jobs:
  publish:
    name: Build and publish to Chrome Web Store
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Validate release version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          manifest_version="$(node -p "require('./public/manifest.json').version")"
          dist_manifest_version="$(node -p "require('./dist/manifest.json').version")"

          echo "tag=${tag_version}"
          echo "package.json=${package_version}"
          echo "public/manifest.json=${manifest_version}"
          echo "dist/manifest.json=${dist_manifest_version}"

          test "${package_version}" = "${tag_version}"
          test "${manifest_version}" = "${tag_version}"
          test "${dist_manifest_version}" = "${tag_version}"

      - name: Package extension
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          zip_name="linkedin-activity-tracker-${tag_version}.zip"

          (
            cd dist
            zip -r "../${zip_name}" . -x "*.DS_Store" "__MACOSX/*" "*.map"
          )

          unzip -Z1 "${zip_name}" | grep -qx "manifest.json"
          echo "CHROME_WEBSTORE_ZIP_PATH=${zip_name}" >> "${GITHUB_ENV}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-${{ github.ref_name }}
          path: linkedin-activity-tracker-*.zip
          if-no-files-found: error

      - name: Upload and publish to Chrome Web Store
        env:
          CHROME_WEBSTORE_CLIENT_ID: ${{ secrets.CHROME_WEBSTORE_CLIENT_ID }}
          CHROME_WEBSTORE_CLIENT_SECRET: ${{ secrets.CHROME_WEBSTORE_CLIENT_SECRET }}
          CHROME_WEBSTORE_REFRESH_TOKEN: ${{ secrets.CHROME_WEBSTORE_REFRESH_TOKEN }}
          CHROME_WEBSTORE_PUBLISHER_ID: ${{ secrets.CHROME_WEBSTORE_PUBLISHER_ID }}
          CHROME_WEBSTORE_EXTENSION_ID: ${{ env.CHROME_WEBSTORE_EXTENSION_ID }}
        run: node scripts/chrome-webstore-publish.mjs "${CHROME_WEBSTORE_ZIP_PATH}"
